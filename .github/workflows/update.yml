name: Update M3U8 Playlist

on:
  push:
    branches: [ master, main ]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Playlist
      env:
        JAG_URL: ${{ secrets.JAG_URL }}   # ✅ match with python
      run: python main.py

    - name: Push to External Private Repo
      env:
        TOKEN: ${{ secrets.PAT_TOKEN }}
        TARGET: ${{ secrets.TARGET_REPO }}
      run: |
        git clone https://$TOKEN@github.com/$TARGET target-repo
        
        mkdir -p target-repo/jago
        cp playlist.m3u8 target-repo/jago/playlist.m3u8
        
        cd target-repo
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        
        git add jago/playlist.m3u8
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update playlist" && git push)
